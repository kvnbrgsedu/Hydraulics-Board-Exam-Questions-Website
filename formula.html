<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydraulics Formula Sheet</title>
    <link rel="icon" href="assets/images/engineering.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("hydraulics-theme") === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"], ["$", "$"]],
          displayMath: [["\\[", "\\]"], ["$$", "$$"]],
          processEscapes: true,
          processEnvironments: true,
        },
        chtml: {
          displayAlign: "center",
          displayIndent: "0em",
          linebreaks: {
            automatic: true,
            width: "container",
          },
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  </head>
  <body id="top">
    <div id="progress-bar"></div>

    <header class="top-nav" id="top-nav">
      <div class="top-nav__container">
        <button type="button" class="nav-menu-btn" id="nav-menu-btn" aria-label="Open menu" aria-expanded="false">
          <span class="nav-menu-btn__bar"></span>
          <span class="nav-menu-btn__bar"></span>
          <span class="nav-menu-btn__bar"></span>
        </button>
        <div class="top-nav__brand">
          <span>Hydraulics Review (PH)</span>
        </div>
        <div class="top-nav__right">
          <nav class="top-nav__links">
            <a href="index.html#home" class="nav-link">Home</a>
            <a href="quiz.html" class="nav-link">Quiz</a>
            <a href="formula.html" class="nav-link active">Formula Sheet</a>
            <a href="about.html" class="nav-link">About</a>
          </nav>
          <div class="top-nav__actions">
            <button id="global-search-toggle" class="icon-btn" aria-label="Search">
              ⌕
            </button>
            <div class="global-search" id="global-search">
              <input
                id="global-search-input"
                type="text"
                placeholder="Search questions, formulas, topics, years..."
              />
              <div id="global-search-results" class="global-search__results"></div>
            </div>
            <button id="dark-mode-toggle" class="icon-btn dark-mode-toggle" aria-label="Toggle dark mode" type="button">
              <span class="dark-mode-toggle__icon dark-mode-toggle__icon--moon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              </span>
              <span class="dark-mode-toggle__icon dark-mode-toggle__icon--sun" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              </span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="nav-drawer" id="nav-drawer" aria-hidden="true">
      <div class="nav-drawer__backdrop" id="nav-drawer-backdrop"></div>
      <div class="nav-drawer__panel">
        <div class="nav-drawer__brand">Hydraulics Review (PH)</div>
        <nav class="nav-drawer__links">
          <a href="index.html#home" class="nav-drawer__link nav-link">Home</a>
          <a href="quiz.html" class="nav-drawer__link nav-link">Quiz</a>
          <a href="formula.html" class="nav-drawer__link nav-link active">Formula Sheet</a>
          <a href="about.html" class="nav-drawer__link nav-link">About</a>
        </nav>
        <div class="nav-drawer__search">
          <input type="text" id="drawer-search-input" class="nav-drawer__search-input" placeholder="Search questions, formulas, topics, years..." />
          <div id="drawer-search-results" class="global-search__results nav-drawer__results"></div>
        </div>
      </div>
    </div>

    <main class="content">
      <section id="formulas" class="formula-section">
        <div class="section-header">
          <p class="section-eyebrow">Formula Sheet</p>
          <h2>Hydraulics Formula Library</h2>
          <p class="section-subtitle">
            Filter by topic and search formulas instantly.
          </p>
        </div>
        <div class="formula-controls">
          <input
            id="formula-search"
            type="text"
            placeholder="Search formulas..."
          />
          <select id="formula-topic">
            <option value="all">All Topics</option>
          </select>
        </div>
        <div id="formula-groups" class="formula-groups"></div>
        <div id="formula-empty" class="empty hidden">
          <div class="empty__bubble"></div>
          <h3>No formulas found</h3>
          <p>Try a different topic or keyword.</p>
        </div>
      </section>
    </main>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">
      ↑
    </button>

    <script src="assets/js/app.js"></script>
  </body>
</html>
